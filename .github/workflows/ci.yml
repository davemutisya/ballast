name: CI
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      # Dogfood: run the built binary on our own example migrations.
      - run: node bin/ballast.js check examples/migrations --fail-on critical
