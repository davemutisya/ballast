# Ballast — PR comment + merge gate.
# Copy to .github/workflows/ballast.yml in your repo. On every PR that touches a
# migration, Ballast posts (and updates in place) a comment with the blast-radius
# report, and fails the check if a migration is danger-level.
#
# Load-aware (recommended): add a repo secret BALLAST_DSN pointing at a read-only
# replica/staging DB. Ballast needs only SELECT on pg_catalog/pg_stat_* — no write
# or DDL privileges, and it never reads your data. Without the secret it still runs
# a structural pass.

name: ballast
on:
  pull_request:
    paths: ['**/*.sql', 'migrations/**', 'db/migrate/**']

permissions:
  contents: read
  pull-requests: write   # to post the comment

jobs:
  ballast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: run
        env:
          DSN: ${{ secrets.BALLAST_DSN }}   # optional; empty = structural
        run: |
          set +e
          npx ballast-pg check migrations/ ${DSN:+--dsn "$DSN"} --fail-on danger --format md > ballast.md
          echo "code=$?" >> "$GITHUB_OUTPUT"
          cat ballast.md

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('ballast.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const prior = comments.find((c) => c.body.includes('<!-- ballast -->'));
            if (prior) await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });

      - name: gate
        if: steps.run.outputs.code != '0'
        run: |
          echo "::error::Ballast flagged a danger-level migration — see the PR comment." >&2
          exit 1
